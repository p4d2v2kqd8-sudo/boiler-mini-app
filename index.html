<!doctype html>
<html lang="de">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Boilersteuerung</title>
  <script src="https://telegram.org/js/telegram-web-app.js"></script>
  <style>
    :root {
      --bg: #101216;
      --card: #1b1f27;
      --button: #242a35;
      --text: #f4f4f5;
      --muted: #a1a1aa;
      --border: #333a46;
      --active: #38bdf8;
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      padding: 10px;
      font-family: system-ui, -apple-system, BlinkMacSystemFont, sans-serif;
      background: var(--bg);
      color: var(--text);
      font-size: 14px;
    }

    h1 {
      font-size: 18px;
      margin: 4px 0 10px 0;
      line-height: 1.2;
    }

    button {
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 8px 4px;
      font-size: 14px;
      font-weight: 650;
      color: var(--text);
      background: var(--button);
      min-height: 36px;
    }

    button:active {
      transform: scale(0.98);
      opacity: 0.85;
    }

    .top {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 6px;
      margin-bottom: 10px;
    }

    .panel {
      display: flex;
      flex-direction: column;
      gap: 7px;
    }

    .row {
      display: grid;
      grid-template-columns: 78px repeat(5, 1fr);
      gap: 5px;
      align-items: center;
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 14px;
      padding: 7px;
    }

    .name {
      font-weight: 750;
      font-size: 13px;
      line-height: 1.1;
    }

    .small {
      font-size: 11px;
      color: var(--muted);
      margin-top: 2px;
    }

    .mini {
      min-height: 34px;
      font-size: 16px;
      padding: 6px 2px;
    }

    .legend {
      margin-top: 10px;
      padding: 9px;
      border: 1px solid var(--border);
      border-radius: 12px;
      background: var(--card);
      color: var(--muted);
      font-size: 12px;
      line-height: 1.45;
    }

    .legend b {
      color: var(--text);
      font-weight: 700;
    }

    .overlay {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(0, 0, 0, 0.72);
      align-items: center;
      justify-content: center;
      padding: 14px;
      z-index: 10;
    }

    .modal {
      width: 100%;
      max-width: 420px;
      background: #171b22;
      border: 1px solid var(--border);
      border-radius: 18px;
      padding: 14px;
      box-shadow: 0 12px 40px rgba(0, 0, 0, 0.45);
    }

    .modal h2 {
      margin: 0 0 10px 0;
      font-size: 18px;
    }

    .section {
      margin: 10px 0;
    }

    .label {
      font-size: 12px;
      color: var(--muted);
      margin-bottom: 5px;
    }

    .seg {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 6px;
    }

    .seg button.active {
      outline: 2px solid var(--active);
      background: #0f2f3c;
    }

    .picker {
      display: grid;
      grid-template-columns: 44px 1fr 44px;
      gap: 6px;
      align-items: center;
    }

    .value {
      background: var(--button);
      border: 1px solid var(--border);
      border-radius: 10px;
      min-height: 38px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 17px;
      font-weight: 750;
    }

    .modal-actions {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 8px;
      margin-top: 12px;
    }

    @media (max-width: 360px) {
      body {
        padding: 7px;
      }

      .row {
        grid-template-columns: 70px repeat(5, 1fr);
        gap: 4px;
        padding: 6px;
      }

      .mini {
        font-size: 15px;
      }

      .name {
        font-size: 12px;
      }
    }
  </style>
</head>

<body>
  <h1>Boilersteuerung</h1>

  <div class="top">
    <button onclick="send('/boiler_status')">📊</button>
    <button onclick="send('/boiler_solar')">☀️☀️</button>
    <button onclick="send('/boiler_an')">🔛🔛</button>
    <button onclick="send('/boiler_aus')">⏹⏹</button>
  </div>

  <div class="panel">
    <div class="row">
      <div>
        <div class="name">Bad</div>
        <div class="small">Boiler</div>
      </div>
      <button class="mini" onclick="send('/boiler_bad_aus')">⏹</button>
      <button class="mini" onclick="send('/boiler_bad_solar')">☀️</button>
      <button class="mini" onclick="send('/boiler_bad_an')">🔛</button>
      <button class="mini" onclick="send('/boiler_bad_aufheizen')">🔥</button>
      <button class="mini" onclick="openSchedule('bad', 'Bad')">⏱</button>
    </div>

    <div class="row">
      <div>
        <div class="name">Dusche</div>
        <div class="small">Boiler</div>
      </div>
      <button class="mini" onclick="send('/boiler_dusche_aus')">⏹</button>
      <button class="mini" onclick="send('/boiler_dusche_solar')">☀️</button>
      <button class="mini" onclick="send('/boiler_dusche_an')">🔛</button>
      <button class="mini" onclick="send('/boiler_dusche_aufheizen')">🔥</button>
      <button class="mini" onclick="openSchedule('dusche', 'Dusche')">⏱</button>
    </div>

    <div class="row">
      <div>
        <div class="name">Küche</div>
        <div class="small">Boiler</div>
      </div>
      <button class="mini" onclick="send('/boiler_kueche_aus')">⏹</button>
      <button class="mini" onclick="send('/boiler_kueche_solar')">☀️</button>
      <button class="mini" onclick="send('/boiler_kueche_an')">🔛</button>
      <button class="mini" onclick="send('/boiler_kueche_aufheizen')">🔥</button>
      <button class="mini" onclick="openSchedule('kueche', 'Küche')">⏱</button>
    </div>
  </div>

  <div class="top" style="margin-top:10px;">
    <button onclick="send('/boiler_status_24h')">24h</button>
    <button onclick="send('/boiler_status_alle')">Alle</button>
    <button onclick="send('/boiler_status_nein')">Still</button>
    <button onclick="send('/hilfe')">?</button>
  </div>

  <div class="legend">
    <b>Symbole:</b><br>
    📊 Status · ⏹ AUS · ☀️ SOLAR · 🔛 AN · 🔥 Aufheizen · ⏱ Zeit/Dauer<br>
    ☀️☀️ / 🔛🔛 / ⏹⏹ = global für alle Boiler
  </div>

  <div class="overlay" id="overlay">
    <div class="modal">
      <h2 id="modalTitle">Zeitfunktion</h2>

      <div class="section">
        <div class="label">Aktion</div>
        <div class="seg">
          <button id="actionHeat" class="active" onclick="setAction('aufheizen')">🔥 Aufheizen</button>
          <button id="actionOn" onclick="setAction('stunden_an')">🔛 Stunden AN</button>
        </div>
      </div>

      <div class="section">
        <div class="label">Uhrzeit</div>
        <div class="picker">
          <button onclick="changeHour(-1)">−</button>
          <div class="value" id="hourValue">18:00</div>
          <button onclick="changeHour(1)">+</button>
        </div>
      </div>

      <div class="section" id="durationSection">
        <div class="label">Dauer</div>
        <div class="picker">
          <button onclick="changeDuration(-1)">−</button>
          <div class="value" id="durationValue">2 h</div>
          <button onclick="changeDuration(1)">+</button>
        </div>
      </div>

      <div class="section">
        <div class="label">Wiederholung</div>
        <div class="seg">
          <button id="repeatOnce" class="active" onclick="setRepeat(false)">Einmalig</button>
          <button id="repeatAlways" onclick="setRepeat(true)">Täglich</button>
        </div>
      </div>

      <div class="modal-actions">
        <button onclick="closeSchedule()">Abbrechen</button>
        <button onclick="submitSchedule()">Senden</button>
      </div>
    </div>
  </div>

  <script>
    const tg = window.Telegram && window.Telegram.WebApp ? window.Telegram.WebApp : null;

    if (tg) {
      tg.ready();
      tg.expand();
    }

    let currentBoiler = 'bad';
    let currentBoilerLabel = 'Bad';
    let currentAction = 'aufheizen';
    let currentHour = 18;
    let currentDuration = 2;
    let currentRepeat = false;

    function send(command) {
      if (!tg) {
        alert(command);
        return;
      }

      tg.sendData(JSON.stringify({
        command: command
      }));

      tg.close();
    }

    function openSchedule(key, label) {
      currentBoiler = key;
      currentBoilerLabel = label;
      currentAction = 'aufheizen';
      currentHour = 18;
      currentDuration = 2;
      currentRepeat = false;

      document.getElementById('modalTitle').textContent = label + ' Zeitfunktion';
      updateModal();

      document.getElementById('overlay').style.display = 'flex';
    }

    function closeSchedule() {
      document.getElementById('overlay').style.display = 'none';
    }

    function setAction(action) {
      currentAction = action;
      updateModal();
    }

    function setRepeat(repeat) {
      currentRepeat = repeat;
      updateModal();
    }

    function changeHour(delta) {
      currentHour += delta;

      if (currentHour < 0) currentHour = 23;
      if (currentHour > 23) currentHour = 0;

      updateModal();
    }

    function changeDuration(delta) {
      currentDuration += delta;

      if (currentDuration < 1) currentDuration = 1;
      if (currentDuration > 24) currentDuration = 24;

      updateModal();
    }

    function updateModal() {
      document.getElementById('hourValue').textContent =
        String(currentHour).padStart(2, '0') + ':00';

      document.getElementById('durationValue').textContent =
        currentDuration + ' h';

      document.getElementById('actionHeat').classList.toggle('active', currentAction === 'aufheizen');
      document.getElementById('actionOn').classList.toggle('active', currentAction === 'stunden_an');

      document.getElementById('repeatOnce').classList.toggle('active', currentRepeat === false);
      document.getElementById('repeatAlways').classList.toggle('active', currentRepeat === true);

      document.getElementById('durationSection').style.display =
        currentAction === 'stunden_an' ? 'block' : 'none';
    }

    function submitSchedule() {
      let cmd = '/boiler_' + currentBoiler + '_';

      if (currentRepeat) {
        cmd += 'immer_';
      }

      cmd += currentHour + '_uhr_';

      if (currentAction === 'aufheizen') {
        cmd += 'aufheizen';
      } else {
        cmd += currentDuration + '_stunden_an';
      }

      send(cmd);
    }
  </script>
</body>
</html>
